<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PuzzleTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07101e;--surface:#0d1828;--card:#111f31;--border:#1a2e44;
  --text:#ddeeff;--muted:#4a6a88;--accent:#4d96ff;
  --gold:#ffd93d;--green:#00c9a7;--red:#ff4d6d;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none}
input{font-family:'Nunito',sans-serif;outline:none}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;border-radius:50%;animation:ptfloat linear infinite;opacity:.07}
@keyframes ptfloat{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}
.page{position:relative;z-index:1;min-height:100vh}
.hidden{display:none!important}

/* LOGIN */
#page-login{display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;max-width:360px;width:100%;text-align:center;animation:fadeup .4s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo{font-size:52px;margin-bottom:12px}
.login-title{font-family:'Fredoka One',cursive;font-size:28px;color:#fff;margin-bottom:4px}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.login-input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-weight:700;letter-spacing:3px;margin-bottom:12px;transition:border .2s;text-align:center}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#4d96ff,#845ec2);color:#fff;font-family:'Fredoka One',cursive;font-size:17px;transition:filter .2s}
.login-btn:hover{filter:brightness(1.12)}
.login-err{color:var(--red);font-size:13px;font-weight:700;margin-top:8px;min-height:18px}

/* ADMIN */
#page-admin{padding-bottom:60px}
.adm-header{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0b1525,#091220);flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.adm-brand{display:flex;align-items:center;gap:12px}
.adm-logo{font-size:30px}
.adm-title{font-family:'Fredoka One',cursive;font-size:22px;color:#fff}
.adm-sub{font-size:11px;color:var(--muted);margin-top:1px}
.adm-stats{display:flex;gap:18px;flex-wrap:wrap}
.adm-stat{text-align:center}
.adm-stat-n{display:block;font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold)}
.adm-stat-l{display:block;font-size:11px;color:var(--muted);white-space:nowrap}
.adm-logout{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700}
.adm-logout:hover{border-color:var(--red);color:var(--red)}
.gbar-wrap{padding:10px 28px;background:#091220;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.gbar-track{flex:1;height:5px;background:var(--border);border-radius:4px;overflow:hidden}
.gbar-fill{height:100%;background:linear-gradient(90deg,#4d96ff,#845ec2,#ff6b6b);border-radius:4px;transition:width .8s}
.gbar-lbl{font-size:11px;color:var(--muted);white-space:nowrap}
.filters{padding:14px 28px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #0a1620}
.srch{flex:1;min-width:180px;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px}
.srch:focus{border-color:var(--accent)}
.ftabs{display:flex;gap:5px;flex-wrap:wrap}
.ft{padding:7px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;white-space:nowrap;transition:all .2s}
.ft:hover{border-color:var(--accent);color:var(--accent)}
.ft.on{background:#4d96ff22;border-color:var(--accent)!important;color:var(--accent)!important}
.res-count{padding:6px 28px;font-size:11px;color:var(--muted)}
.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;padding:0 28px}
.ucard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;cursor:pointer;text-align:left;transition:all .18s;width:100%}
.ucard:hover{border-color:#4d96ff55;background:#111e30;transform:translateY(-2px)}
.ucard.done{border-color:#ffd93d44;box-shadow:0 0 16px #ffd93d12}
.ucard.done:hover{border-color:var(--gold)!important}
.uc-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;position:relative}
.uc-av{font-size:26px;flex-shrink:0}
.uc-nm{color:var(--text);font-weight:800;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-id{color:var(--muted);font-size:10px}
.uc-crown{position:absolute;right:0;top:-3px;font-size:13px}
.minipzl{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:7px;border-radius:6px;overflow:hidden}
.mp{height:14px;transition:background .3s;background-size:cover;background-position:center}
.uc-btrack{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px}
.uc-bfill{height:100%;border-radius:3px;transition:width .5s}
.uc-ptxt{font-size:10px;color:var(--muted)}

/* MODAL */
.overlay{position:fixed;inset:0;background:#000000cc;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:overin .2s ease}
@keyframes overin{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;max-width:620px;width:100%;max-height:92vh;overflow-y:auto;animation:modin .25s ease;position:relative}
@keyframes modin{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.mod-uhead{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.mod-uav{font-size:46px}
.mod-unm{font-family:'Fredoka One',cursive;font-size:22px;color:#fff}
.mod-uid{color:var(--muted);font-size:13px;margin-top:2px}
.mod-badge{background:#ffd93d22;color:var(--gold);font-weight:800;padding:2px 8px;border-radius:7px;font-size:12px;margin-left:8px}
.mod-btrack{height:7px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:14px}
.mod-bfill{height:100%;border-radius:5px;transition:width .5s}
.pzl-hint{font-size:11px;color:var(--muted);margin-bottom:10px;text-align:center}

/* PUZZLE GRID - imagen real */
.pzl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:18px}
.ppc{aspect-ratio:1;border-radius:11px;border:2px solid transparent;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;transition:all .22s;cursor:pointer;overflow:hidden;position:relative}
.ppc.empty{background:var(--surface)!important;border:2px dashed #1a2e44!important}
.ppc.empty:hover{border-color:#4d96ff66!important}
.ppc.filled:hover{filter:brightness(1.1);transform:scale(1.04)}
.ppc.anim{animation:ppin .45s ease}
@keyframes ppin{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.15) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.ppc-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:9px}
.ppc-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);border-radius:9px;pointer-events:none}
.ppc-lbl{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;font-weight:900;color:#fff;pointer-events:none;text-shadow:0 1px 3px #000}
.ppc-empty-ico{font-size:22px;opacity:.2}
.ppc-empty-lbl{font-size:9px;font-weight:800;opacity:.25}

.done-banner{background:linear-gradient(135deg,#ffd93d18,#ff8e5318);border:1px solid #ffd93d44;color:var(--gold);padding:13px;border-radius:11px;text-align:center;font-weight:800;font-size:14px;margin-bottom:16px}

/* QR */
.qr-toggle{background:var(--surface);border:1px solid var(--border);color:var(--accent);padding:11px 18px;border-radius:10px;font-weight:800;font-size:13px;margin-bottom:14px;width:100%;transition:all .2s}
.qr-toggle:hover{background:#4d96ff11;border-color:#4d96ff55}
.qr-section{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
.qr-stitle{font-family:'Fredoka One',cursive;font-size:17px;color:#fff;margin-bottom:4px}
.qr-ssub{font-size:12px;color:var(--muted);margin-bottom:14px}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.qr-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px;text-align:center;transition:opacity .2s}
.qr-card.got{opacity:.45}
.qr-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;margin-bottom:6px}
.qr-plbl{font-weight:800;font-size:12px;margin-bottom:5px}
.qr-img{width:100%;max-width:130px;height:auto;border-radius:5px;background:var(--card)}
.qr-st{font-size:10px;font-weight:800;margin-top:5px}
.qr-st.ok{color:var(--green)}
.qr-st.pend{color:var(--muted)}

/* CLAIM */
#page-claim{display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh}
.claim-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 26px;max-width:380px;width:100%;text-align:center;animation:fadeup .35s ease}
.cl-bigico{font-size:60px;line-height:1;margin-bottom:10px}
.cl-title{font-family:'Fredoka One',cursive;font-size:24px;color:#fff;margin-bottom:18px;line-height:1.2}
.cl-urow{display:flex;align-items:center;gap:12px;justify-content:center;background:var(--surface);border-radius:11px;padding:11px;margin-bottom:18px}
.cl-unm{color:var(--text);font-weight:800;font-size:14px;text-align:left}
.cl-uid{color:var(--muted);font-size:11px;text-align:left}

/* Pieza grande en claim */
.cl-piece-wrap{width:130px;height:130px;border-radius:16px;overflow:hidden;margin:0 auto 14px;position:relative;box-shadow:0 8px 32px #0008}
.cl-piece-img{width:100%;height:100%;object-fit:cover}
.cl-piece-num{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-weight:900;font-size:13px;color:#fff;text-shadow:0 1px 4px #000;background:linear-gradient(transparent,rgba(0,0,0,.6));padding:8px 0 4px}

.cl-msg{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}

/* mini mosaico claim */
.cl-miniwrap{background:var(--surface);border-radius:11px;padding:13px;margin-bottom:14px}
.cl-minigrid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;max-width:200px;margin:0 auto 7px;border-radius:6px;overflow:hidden}
.cl-mp{height:28px;transition:all .3s;background-size:cover;background-position:center}
.cl-ptxt{font-size:12px;color:var(--muted);font-weight:700}
.cl-donebanner{background:#ffd93d11;border:1px solid #ffd93d44;color:var(--gold);padding:11px;border-radius:9px;font-weight:800;font-size:13px;margin-bottom:14px}
.cl-footer{font-size:11px;color:var(--muted);margin-top:6px}

/* CONFETTI */
.cf{position:fixed;top:-12px;pointer-events:none;z-index:9999;animation:cfall 3.5s ease-in forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

@media(max-width:600px){
  .adm-header{padding:14px}
  .filters{padding:10px 12px}
  .ugrid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));padding:0 10px}
  .gbar-wrap,.res-count{padding-left:12px;padding-right:12px}
  .pzl-grid{gap:5px}
}
</style>
</head>
<body>
<div id="particles"></div>

<!-- LOGIN -->
<div id="page-login" class="page hidden">
  <div class="login-box">
    <div class="login-logo">🧩</div>
    <h1 class="login-title">PuzzleTracker</h1>
    <p class="login-sub">Panel de administrador — acceso restringido</p>
    <input class="login-input" type="password" id="pw-input" placeholder="Contraseña" autocomplete="current-password">
    <button class="login-btn" onclick="tryLogin()">Entrar →</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page hidden">
  <header class="adm-header">
    <div class="adm-brand">
      <span class="adm-logo">🧩</span>
      <div><div class="adm-title">PuzzleTracker</div><div class="adm-sub">Panel de administrador</div></div>
    </div>
    <div class="adm-stats">
      <div class="adm-stat"><span class="adm-stat-n" id="st-complete">0</span><span class="adm-stat-l">✅ Completos</span></div>
      <div class="adm-stat"><span class="adm-stat-n" id="st-prog">0</span><span class="adm-stat-l">⏳ En progreso</span></div>
      <div class="adm-stat"><span class="adm-stat-n" id="st-total">0</span><span class="adm-stat-l">🧩 Fichas totales</span></div>
    </div>
    <button class="adm-logout" onclick="logout()">Cerrar sesión</button>
  </header>
  <div class="gbar-wrap">
    <div class="gbar-track"><div class="gbar-fill" id="gbar" style="width:0%"></div></div>
    <span class="gbar-lbl" id="gbar-lbl">0 / 1200 fichas</span>
  </div>
  <div class="filters">
    <input class="srch" type="text" id="search-input" placeholder="🔍  Buscar por nombre o #ID…" oninput="renderGrid()">
    <div class="ftabs">
      <button class="ft on" onclick="setFilter(this,'all')">Todos</button>
      <button class="ft" onclick="setFilter(this,'done')">✅ Completos</button>
      <button class="ft" onclick="setFilter(this,'prog')">⏳ En progreso</button>
      <button class="ft" onclick="setFilter(this,'none')">⬜ Sin piezas</button>
    </div>
  </div>
  <div class="res-count" id="res-count"></div>
  <div class="ugrid" id="ugrid"></div>
</div>

<!-- CLAIM -->
<div id="page-claim" class="page hidden">
  <div class="claim-card" id="claim-card"></div>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

// ══ COLORES (para fallback y mini) ══
const COLORS=['#FF6B6B','#FF8E53','#FFA534','#FFD93D','#A8E063','#4D96FF','#845EC2','#FF9671','#00C9A7','#FF4D6D','#4BC6B9','#C4A35A'];
const TOTAL=12;
const EMOJIS=['🦊','🐱','🐻','🐼','🐨','🦁','🐯','🐸','🐧','🦋','🦄','🐙','🦀','🐬','🦜','🐺','🦔','🐝','🦩','🦅'];
const FNAMES=['Ana','Carlos','María','Juan','Laura','Pedro','Sofía','Miguel','Valentina','Diego','Isabella','Andrés','Camila','Luis','Gabriela','Javier','Natalia','Alejandro','Daniela','Sebastián','Sara','Felipe','Paula','Tomás','Andrea','Mateo','Elena','Nicolás','Carolina','Roberto'];
const LNAMES=['García','Martínez','López','Rodríguez','González','Hernández','Pérez','Sánchez','Ramírez','Torres','Flores','Rivera','Gómez','Díaz','Cruz','Morales','Reyes','Jiménez','Vargas','Castillo'];

const USERS=Array.from({length:100},(_,i)=>({
  id:i+1,
  name:`${FNAMES[i%FNAMES.length]} ${LNAMES[Math.floor(i/FNAMES.length)%LNAMES.length]}`,
  avatar:EMOJIS[i%EMOJIS.length]
}));

let activeFilter='all';

// ══ STORAGE ══
function getPieces(uid){try{const v=localStorage.getItem('pzl_'+uid);return v?JSON.parse(v):Array(TOTAL).fill(false);}catch{return Array(TOTAL).fill(false);}}
function setPieces(uid,p){try{localStorage.setItem('pzl_'+uid,JSON.stringify(p));}catch{}}

// ══ ROUTER ══
function router(){
  buildParticles();
  const params=new URLSearchParams(location.search);
  const uid=parseInt(params.get('u'));
  const piece=parseInt(params.get('p'));
  if(uid>=1&&uid<=100&&piece>=1&&piece<=TOTAL){showClaimPage(uid,piece);}
  else{if(sessionStorage.getItem('adm_auth')==='1')showAdmin();else showLogin();}
}

function buildParticles(){
  const c=document.getElementById('particles');
  for(let i=0;i<16;i++){
    const d=document.createElement('div');d.className='pt';
    const sz=20+Math.random()*55;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${COLORS[i%12]};animation-duration:${14+Math.random()*16}s;animation-delay:${-Math.random()*20}s;opacity:${0.03+Math.random()*0.05}`;
    c.appendChild(d);
  }
}

// ══ LOGIN ══
function showLogin(){
  document.getElementById('page-login').classList.remove('hidden');
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
  document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
}
function tryLogin(){
  if(document.getElementById('pw-input').value===ADMIN_PASSWORD){
    sessionStorage.setItem('adm_auth','1');
    document.getElementById('page-login').classList.add('hidden');
    showAdmin();
  }else{
    const el=document.getElementById('login-err');
    el.textContent='Contraseña incorrecta';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
    setTimeout(()=>el.textContent='',2500);
  }
}
function logout(){
  sessionStorage.removeItem('adm_auth');
  document.getElementById('page-admin').classList.add('hidden');
  document.getElementById('pw-input').value='';
  showLogin();
}

// ══ ADMIN ══
function showAdmin(){
  document.getElementById('page-admin').classList.remove('hidden');
  updateStats();renderGrid();
}
function updateStats(){
  let complete=0,prog=0,total=0;
  USERS.forEach(u=>{const p=getPieces(u.id);const c=p.filter(Boolean).length;total+=c;if(c===TOTAL)complete++;else if(c>0)prog++;});
  document.getElementById('st-complete').textContent=complete;
  document.getElementById('st-prog').textContent=prog;
  document.getElementById('st-total').textContent=total;
  const pct=(total/(100*TOTAL)*100).toFixed(1);
  document.getElementById('gbar').style.width=pct+'%';
  document.getElementById('gbar-lbl').textContent=`${total} / ${100*TOTAL} fichas entregadas`;
}
function setFilter(btn,f){
  activeFilter=f;
  document.querySelectorAll('.ft').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderGrid();
}
function renderGrid(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const filtered=USERS.filter(u=>{
    const ok=u.name.toLowerCase().includes(q)||String(u.id).includes(q);
    if(!ok)return false;
    const c=getPieces(u.id).filter(Boolean).length;
    if(activeFilter==='done')return c===TOTAL;
    if(activeFilter==='prog')return c>0&&c<TOTAL;
    if(activeFilter==='none')return c===0;
    return true;
  });
  document.getElementById('res-count').textContent=`${filtered.length} usuario${filtered.length!==1?'s':''}`;
  const grid=document.getElementById('ugrid');grid.innerHTML='';
  filtered.forEach(u=>{
    const pieces=getPieces(u.id);
    const count=pieces.filter(Boolean).length;
    const pct=Math.round(count/TOTAL*100);
    const done=count===TOTAL;
    const card=document.createElement('button');
    card.className='ucard'+(done?' done':'');
    card.onclick=()=>openModal(u.id);
    const mpHtml=pieces.map((has,i)=>`<div class="mp" style="${has?`background-image:url(${PIECE_IMGS[i]});background-size:cover;background-position:center`:`background:#1a2e44`}"></div>`).join('');
    const barBg=done?'linear-gradient(90deg,#FFD93D,#FF8E53)':'linear-gradient(90deg,#4D96FF,#845EC2)';
    card.innerHTML=`
      <div class="uc-top">
        <span class="uc-av">${u.avatar}</span>
        <div style="overflow:hidden;min-width:0"><div class="uc-nm">${u.name}</div><div class="uc-id">#${String(u.id).padStart(3,'0')}</div></div>
        ${done?'<span class="uc-crown">👑</span>':''}
      </div>
      <div class="minipzl">${mpHtml}</div>
      <div class="uc-btrack"><div class="uc-bfill" style="width:${pct}%;background:${barBg}"></div></div>
      <div class="uc-ptxt">${count}/12 piezas · ${pct}%</div>`;
    grid.appendChild(card);
  });
}

// ══ MODAL ══
function openModal(uid){
  const u=USERS[uid-1];
  const pieces=getPieces(uid);
  const count=pieces.filter(Boolean).length;
  const done=count===TOTAL;
  const pct=Math.round(count/TOTAL*100);
  const barBg=done?'linear-gradient(90deg,#FFD93D,#FF8E53)':'linear-gradient(90deg,#4D96FF,#845EC2)';
  const pzlHtml=pieces.map((has,i)=>`
    <button class="ppc ${has?'filled':'empty'}" id="ppc-${uid}-${i}" onclick="togglePiece(${uid},${i})">
      ${has?`<img class="ppc-img" src="${PIECE_IMGS[i]}" loading="lazy"><div class="ppc-overlay"></div><span class="ppc-lbl">#${i+1}</span>`
          :`<span class="ppc-empty-ico">❔</span><span class="ppc-empty-lbl">#${i+1}</span>`}
    </button>`).join('');
  document.getElementById('modal').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="mod-uhead">
      <span class="mod-uav">${u.avatar}</span>
      <div>
        <div class="mod-unm">${u.name}${done?'<span class="mod-badge">👑 Completo</span>':''}</div>
        <div class="mod-uid" id="mod-uid-${uid}">Usuario #${String(uid).padStart(3,'0')} · <span style="color:${COLORS[count%12]}">${count}/12 piezas</span></div>
      </div>
    </div>
    <div class="mod-btrack"><div class="mod-bfill" id="mod-bar-${uid}" style="width:${pct}%;background:${barBg}"></div></div>
    ${done?`<div class="done-banner">🎉 ¡Rompecabezas completado!</div>`:''}
    <p class="pzl-hint">Haz clic en una pieza para marcarla / desmarcarla manualmente</p>
    <div class="pzl-grid">${pzlHtml}</div>
    <button class="qr-toggle" onclick="toggleQR(${uid})">📲 Ver códigos QR para imprimir</button>
    <div id="qr-section-${uid}" class="qr-section hidden">
      <div class="qr-stitle">Códigos QR — ${u.name}</div>
      <div class="qr-ssub">Cada código entrega una pieza al escanearlo. Imprímelos y distribúyelos en el orden que prefieras.</div>
      <div class="qr-grid">${Array.from({length:12},(_,i)=>`
        <div class="qr-card${pieces[i]?' got':''}" id="qrc-${uid}-${i}">
          <img class="qr-thumb" src="${PIECE_IMGS[i]}" loading="lazy">
          <div class="qr-plbl" style="color:${COLORS[i]}">Pieza #${i+1}</div>
          <img class="qr-img" src="${qrUrl(uid,i+1)}" alt="QR pieza ${i+1}" loading="lazy">
          <div class="qr-st ${pieces[i]?'ok':'pend'}">${pieces[i]?'✅ Obtenida':'⏳ Pendiente'}</div>
        </div>`).join('')}
      </div>
    </div>`;
  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.add('hidden');
    updateStats();renderGrid();
  }
}
function toggleQR(uid){
  const s=document.getElementById('qr-section-'+uid);
  const btn=s.previousElementSibling;
  s.classList.toggle('hidden');
  btn.textContent=s.classList.contains('hidden')?'📲 Ver códigos QR para imprimir':'✕ Cerrar códigos QR';
}
function togglePiece(uid,idx){
  const pieces=getPieces(uid);
  pieces[idx]=!pieces[idx];
  setPieces(uid,pieces);
  const btn=document.getElementById(`ppc-${uid}-${idx}`);
  if(pieces[idx]){
    btn.className='ppc filled anim';
    btn.innerHTML=`<img class="ppc-img" src="${PIECE_IMGS[idx]}" loading="lazy"><div class="ppc-overlay"></div><span class="ppc-lbl">#${idx+1}</span>`;
    setTimeout(()=>btn.classList.remove('anim'),500);
  }else{
    btn.className='ppc empty';
    btn.innerHTML=`<span class="ppc-empty-ico">❔</span><span class="ppc-empty-lbl">#${idx+1}</span>`;
  }
  const qrc=document.getElementById(`qrc-${uid}-${idx}`);
  if(qrc){qrc.className='qr-card'+(pieces[idx]?' got':'');qrc.querySelector('.qr-st').className='qr-st '+(pieces[idx]?'ok':'pend');qrc.querySelector('.qr-st').textContent=pieces[idx]?'✅ Obtenida':'⏳ Pendiente';}
  const count=pieces.filter(Boolean).length;
  const uidEl=document.getElementById(`mod-uid-${uid}`);
  if(uidEl)uidEl.innerHTML=`Usuario #${String(uid).padStart(3,'0')} · <span style="color:${COLORS[count%12]}">${count}/12 piezas</span>`;
  const bar=document.getElementById(`mod-bar-${uid}`);
  if(bar){const done=count===TOTAL;bar.style.width=Math.round(count/TOTAL*100)+'%';bar.style.background=done?'linear-gradient(90deg,#FFD93D,#FF8E53)':'linear-gradient(90deg,#4D96FF,#845EC2)';}
}

// ══ QR URLs ══
function baseUrl(){return window.location.origin+window.location.pathname;}
function claimLink(uid,piece){return `${baseUrl()}?u=${uid}&p=${piece}`;}
function qrUrl(uid,piece){return `https://api.qrserver.com/v1/create-qr-code/?size=130x130&color=ddeeff&bgcolor=111f31&data=${encodeURIComponent(claimLink(uid,piece))}`;}

// ══ CLAIM PAGE ══
function showClaimPage(uid,pieceIdx){
  const u=USERS[uid-1];
  const pieces=getPieces(uid);
  const alreadyHad=pieces[pieceIdx-1];
  if(!alreadyHad){pieces[pieceIdx-1]=true;setPieces(uid,pieces);}
  const count=pieces.filter(Boolean).length;
  const done=count===TOTAL;
  const img=PIECE_IMGS[pieceIdx-1];

  const miniHtml=pieces.map((has,i)=>`
    <div class="cl-mp" style="${has?`background-image:url(${PIECE_IMGS[i]});background-size:cover;background-position:center;${i===pieceIdx-1&&!alreadyHad?'transform:scale(1.2);box-shadow:0 0 8px '+COLORS[i]+'88;border-radius:3px':''}`:`background:#1a2e44`}"></div>`).join('');

  let icon,title,msg;
  if(alreadyHad){icon='🔄';title='Ya tenías esta pieza';msg=`Ya habías recibido la pieza #${pieceIdx}. ¡Sigue buscando las demás!`;}
  else if(done){icon='🎊';title='¡Rompecabezas<br>Completado!';msg='¡Recibiste la última pieza! Tu rompecabezas está completo.';}
  else{icon='🎁';title='¡Nueva ficha<br>recibida!';msg=`¡Obtuviste la pieza #${pieceIdx}! Sigue escaneando para completar tu rompecabezas.`;}

  document.getElementById('claim-card').innerHTML=`
    <div class="cl-bigico">${icon}</div>
    <h1 class="cl-title">${title}</h1>
    <div class="cl-urow">
      <span style="font-size:34px">${u.avatar}</span>
      <div><div class="cl-unm">${u.name}</div><div class="cl-uid">Usuario #${String(uid).padStart(3,'0')}</div></div>
    </div>
    <div class="cl-piece-wrap" style="box-shadow:0 8px 32px ${COLORS[pieceIdx-1]}55">
      <img class="cl-piece-img" src="${img}">
      <div class="cl-piece-num">Pieza #${pieceIdx}</div>
    </div>
    <p class="cl-msg">${msg}</p>
    <div class="cl-miniwrap">
      <div class="cl-minigrid">${miniHtml}</div>
      <div class="cl-ptxt">${count}/12 piezas · ${Math.round(count/TOTAL*100)}% completado</div>
    </div>
    ${done?`<div class="cl-donebanner">🏆 ¡Felicitaciones, ${u.name.split(' ')[0]}! ¡Lo lograste!</div>`:''}
    <div class="cl-footer">🧩 PuzzleTracker · Sigue escaneando los QR para completar tu colección</div>`;

  document.getElementById('page-claim').classList.remove('hidden');
  if(!alreadyHad)setTimeout(fireConfetti,300);
}

// ══ CONFETTI ══
function fireConfetti(){
  for(let i=0;i<60;i++){
    const d=document.createElement('div');d.className='cf';
    const sz=5+Math.random()*9;
    d.style.cssText=`left:${5+Math.random()*90}%;width:${sz}px;height:${sz}px;background:${COLORS[i%12]};border-radius:${i%3===0?'50%':i%3===1?'2px':'0'};animation-delay:${Math.random()*1.2}s`;
    document.body.appendChild(d);setTimeout(()=>d.remove(),4800);
  }
}

router();
</script>
